use-filedir-conf=yes  # 启用视频目录的mpv.conf（yes/no）

# 基础播放设置
#volume=100  # 初始音量（0-100）
mute=yes    # 静音（yes/no）
loop-file=inf  # 单文件循环（inf表示无限循环）

# 视频/画质设置
#vo=gpu  # 视频输出后端（默认gpu）
#hwdec=no  # 硬件解码（默认no）
#profile=gpu-hq  # 高质量渲染预设
#deband=yes  # 启用色带消除

# 窗口/界面设置
#ontop=no  # 窗口置顶（yes/no）
#border=no  # 无边框窗口（yes/no）
window-maximized=yes  # 启动时最大化（yes/no）
fullscreen=no  # 启动时全屏（yes/no）

# 字幕设置
slang=zh-CN,zh,chi,zho,zh-TW  # 字幕语言优先级
sub-auto=all  # 自动加载所有字幕
sub-visibility=yes  # 默认显示字幕
sub-pos=95  # 字幕位置（默认100）
sub-font='Noto Sans CJK SC'  # 字体
sub-font-size=36  # 字号
sub-color='#FFFFFFFF'  # 颜色（RGBA）
sub-border-size=2.5  # 描边大小
sub-shadow-offset=1  # 阴影偏移

# 高级设置
#save-position-on-quit=yes  # 退出时保存进度
#input-conf=~/.config/mpv/input.conf  # 快捷键文件
player-operation-mode=pseudo-gui  # 伪GUI模式（需最新版MPV）

# 性能优化
vd-lavc-threads=4  # 解码线程数（根据CPU调整）
cache=yes  # 启用缓存
cache-secs=300  # 缓存秒数（网络流建议）
